name: Build Android APK

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Publish release with version (e.g. 1.0.0). Leave empty to skip release.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect release version
        id: ver
        shell: bash
        run: |
          set +o pipefail
          IN="${{ github.event.inputs.release_version }}"
          if [ -n "$IN" ]; then
            V="$IN"
          else
            MSG=$(git log -1 --pretty=%s)
            V=$(echo "$MSG" | grep -oE 'Release v[0-9]+\.[0-9]+\.[0-9]+' | head -1 | sed 's/Release v//' || true)
          fi
          V="${V:-}"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          if [ -n "$V" ]; then
            echo "Will publish release: v$V"
          else
            echo "No release version detected - APK build only."
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-android

      - name: Restore
        run: dotnet restore src/LocalWallet/LocalWallet.csproj

      - name: Publish Android APK (Release)
        id: publish
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          dotnet publish src/LocalWallet/LocalWallet.csproj \
            -f net10.0-android \
            -c Release \
            -p:AndroidPackageFormat=apk \
            -o ./artifacts 2>&1 | tee /tmp/publish.log

      - name: Surface build errors
        if: always()
        shell: bash
        run: |
          echo "## Publish step output" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ -f /tmp/publish.log ]; then
            grep -nE 'error [A-Z]+[0-9]+|: error|FAILED|Unhandled exception|Build FAILED|XLS[0-9]+|Fatal' /tmp/publish.log | head -120 >> "$GITHUB_STEP_SUMMARY" || true
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "--- tail ---" >> "$GITHUB_STEP_SUMMARY"
            tail -150 /tmp/publish.log >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload full build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/publish.log
          retention-days: 7

      - name: Emit build errors as annotations
        if: always() && steps.publish.outcome == 'failure'
        shell: bash
        run: |
          if [ ! -f /tmp/publish.log ]; then exit 0; fi
          grep -nE 'error [A-Z]+[0-9]+|: error|FAILED|error MSB|error XA|error XAMLC|error XLS|error NU' /tmp/publish.log | head -40 | while IFS= read -r line; do
            safe=$(printf '%s' "$line" | sed 's/%/%25/g; s/\r//g' | tr '\n' ' ')
            echo "::error::$safe"
          done

      - name: Push build log to ci-log branch (on failure)
        if: always() && steps.publish.outcome == 'failure'
        shell: bash
        run: |
          set -x
          git config --global user.name "ci"
          git config --global user.email "ci@localwallet.local"
          WORK=$(mktemp -d)
          cd "$WORK"
          git init -q -b ci-log
          cp /tmp/publish.log latest.txt 2>/dev/null || echo "no log" > latest.txt
          echo "$GITHUB_SHA" > sha.txt
          git add -A
          git commit -q -m "CI log for $GITHUB_SHA" || { echo "nothing to commit"; exit 0; }
          REMOTE="https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git push -f "$REMOTE" ci-log:ci-log
          echo "Pushed to ci-log. URL: https://raw.githubusercontent.com/${{ github.repository }}/ci-log/latest.txt"

      - name: Fail if publish failed
        if: steps.publish.outcome == 'failure'
        run: exit 1

      - name: Prepare release file
        if: steps.ver.outputs.version != ''
        run: |
          mkdir -p ./release
          cp ./artifacts/*-Signed.apk "./release/LocalWallet-v${{ steps.ver.outputs.version }}.apk"
          ls -la ./release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalWallet-apk
          path: ./artifacts/*-Signed.apk
          if-no-files-found: warn
          retention-days: 90

      - name: Publish GitHub Release
        if: steps.ver.outputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: LocalWallet v${{ steps.ver.outputs.version }}
          files: ./release/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
