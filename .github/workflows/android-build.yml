name: Build Android APK

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Publish release with version (e.g. 1.0.0). Leave empty to skip release.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect release version
        id: ver
        shell: bash
        run: |
          IN="${{ github.event.inputs.release_version }}"
          if [ -n "$IN" ]; then
            V="$IN"
          else
            MSG=$(git log -1 --pretty=%s)
            V=$(echo "$MSG" | grep -oE 'Release v[0-9]+\.[0-9]+\.[0-9]+' | head -1 | sed 's/Release v//')
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          if [ -n "$V" ]; then
            echo "Will publish release: v$V"
          else
            echo "No release version detected - APK build only."
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-android

      - name: Restore
        run: dotnet restore src/LocalWallet/LocalWallet.csproj

      - name: Publish Android APK (Release)
        run: >
          dotnet publish src/LocalWallet/LocalWallet.csproj
          -f net10.0-android
          -c Release
          -p:AndroidPackageFormat=apk
          -o ./artifacts

      - name: Prepare release file
        if: steps.ver.outputs.version != ''
        run: |
          mkdir -p ./release
          cp ./artifacts/*-Signed.apk "./release/LocalWallet-v${{ steps.ver.outputs.version }}.apk"
          ls -la ./release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalWallet-apk
          path: ./artifacts/*-Signed.apk
          if-no-files-found: warn
          retention-days: 90

      - name: Publish GitHub Release
        if: steps.ver.outputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: LocalWallet v${{ steps.ver.outputs.version }}
          files: ./release/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
